name: Mustang Sage CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: uv sync --all-extras --dev
      
    - name: Run Pytest Guardrails
      env:
        PYTHONPATH: .
      run: |
        uv run pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.GOOGLE_API_KEY != '' }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up uv
      uses: astral-sh/setup-uv@v3
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv sync --all-extras --dev
    - name: Run E2E Endpoint Check
      env:
        PYTHONPATH: .
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SHOPVOX_API_KEY: ${{ secrets.SHOPVOX_API_KEY }}
      run: |
        uv run pytest tests/test_e2e_flow.py
