# ===================================================================
# Mustang Sage - System Scale & Configuration
# ===================================================================

platforms:
  teams_enabled: true
  slack_enabled: true

governance:
  compliance_data_owner: "Jane Doe, Compliance Officer"
  technical_contact_email: "dev-alerts@example.com"

compliance_source:
  # For local testing, this path points to the file inside the project directory.
  # This works because of the volume mount in docker-compose.yml.
  # For production, you would change this to the absolute path of the
  # file on your shared network drive (e.g., "/mnt/shared/compliance_data.xlsx").
  excel_file_path: "config/compliance_sources/compliance_data.xlsx"

context_management:
  max_history_messages: 10
  truncation_strategy: "middle"
  rag_top_k_results: 3
  archive_threshold_lines: 500
  archive_threshold_age_days: 14

orchestration:
  engine: "langgraph"
  max_steps: 10
  agent_workflow_enabled: true

llm:
  primary:
    provider: "google"
    model: "gemini-1.5-flash"
  embedder:
    provider: "google"

database:
  type: "vector"
  vector_store:
    provider: "chroma"
    collection_name: "project_recipes"
    chroma_persist_directory: "/app/chroma_db"

audit:
  schedule_interval_months: 6
  schedule_day: "1"
  schedule_time: "02:00"
  schedule_timezone: "UTC"
  notification_channel: "none"
  notification_link: ""
  auto_apply: false
  cve_check_weekly: true
