# ===================================================================
# Mustang Sage - System Scale & Configuration
# ===================================================================

platforms:
  teams_enabled: true
  slack_enabled: true

governance:
  compliance_data_owner: "Jane Doe, Compliance Officer"
  technical_contact_email: "dev-alerts@example.com"

business_rules:
  # The minimum gross margin percentage required for a project.
  # Represented as a decimal (e.g., 0.35 for 35%).
  margin_floor: 0.35

compliance_source:
  # This path points to the central compliance data file.
  # For production, this should be an absolute path on a shared network drive.
  # In "demo" mode (set in .env), this path is automatically overridden
  # to use 'scripts/demo/demo_compliance_data.xlsx'.
  excel_file_path: "/path/to/your/shared/network/drive/compliance_data.xlsx"

context_management:
  max_history_messages: 10
  truncation_strategy: "middle"
  rag_top_k_results: 3
  archive_threshold_lines: 500
  archive_threshold_age_days: 14

orchestration:
  engine: "langgraph"
  max_steps: 10
  agent_workflow_enabled: true

llm:
  primary:
    # Options: "google", "openai", "anthropic"
    provider: "google"
    model: "gemini-1.5-flash"
  embedder:
    provider: "google"

database:
  type: "vector"
  vector_store:
    # Options: "chroma", "neon"
    provider: "chroma"
    collection_name: "project_recipes"
    chroma_persist_directory: "/app/chroma_db"

audit:
  schedule_interval_months: 6
  schedule_day: "1"
  schedule_time: "02:00"
  schedule_timezone: "UTC"
  notification_channel: "none"
  notification_link: ""
  auto_apply: false
  cve_check_weekly: true
